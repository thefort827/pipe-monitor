{% extends "base.html" %}
{% block title %}管理员登录 - 管网监测系统{% endblock %}
{% block head_extra %}
<style>
    body {
        overflow: hidden;
    }

    /* 城市天际线背景 SVG */
    .city-bg {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        opacity: 0.12;
    }

    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
    }

    .login-card {
        background: rgba(17, 24, 39, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 0 40px rgba(99, 102, 241, 0.1),
                    0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .login-header {
        text-align: center;
        margin-bottom: 36px;
    }

    .login-header h4 {
        color: var(--text-primary);
        margin-top: 18px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .login-header p {
        color: var(--text-muted);
        font-size: 13px;
        margin-top: 6px;
    }

    .login-icon {
        width: 68px;
        height: 68px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        box-shadow: 0 0 30px rgba(99, 102, 241, 0.4),
                    0 0 60px rgba(99, 102, 241, 0.15);
        animation: icon-pulse 3s ease-in-out infinite;
    }

    @keyframes icon-pulse {
        0%, 100% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.4), 0 0 60px rgba(99, 102, 241, 0.15); }
        50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.6), 0 0 80px rgba(99, 102, 241, 0.25); }
    }

    .form-control {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-light);
        border-radius: 10px;
        padding: 12px 16px;
        color: var(--text-primary);
        transition: all 0.3s ease;
    }

    .form-control:focus {
        background: var(--bg-tertiary);
        border-color: var(--accent-primary);
        color: var(--text-primary);
        box-shadow: 0 0 0 3px var(--accent-primary-soft),
                    0 0 20px var(--accent-primary-glow);
    }

    .form-control::placeholder {
        color: var(--text-muted);
    }

    .form-label {
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
    }

    .btn-login {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        font-weight: 600;
        background: linear-gradient(135deg, #6366f1, #818cf8);
        border: none;
        color: white;
        transition: all 0.3s ease;
        letter-spacing: 0.5px;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 25px rgba(99, 102, 241, 0.5),
                    0 8px 20px rgba(99, 102, 241, 0.3);
        background: linear-gradient(135deg, #818cf8, #a5b4fc);
    }

    .back-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .back-link:hover {
        color: var(--accent-primary);
    }

    .login-divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-light), transparent);
        margin: 24px 0;
    }

    #login-error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
    }
</style>
{% endblock %}

{% block scripts_extra %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');

    try {
        const resp = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await resp.json();

        if (data.success) {
            window.location.href = '/admin';
        } else {
            errorEl.textContent = data.error;
            errorEl.style.display = 'block';
        }
    } catch (e) {
        errorEl.textContent = '登录失败: ' + e.message;
        errorEl.style.display = 'block';
    }
});
</script>
