{% extends "base.html" %}
{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/leaflet.css') }}" />
<style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .main-wrapper {
        display: grid;
        grid-template-columns: 280px 1fr;
        height: calc(100vh - 56px);
    }
    .sidebar-desktop {
        background: rgba(17, 24, 39, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-right: 1px solid var(--border-subtle);
        overflow-y: auto;
        z-index: 1;
    }
    .sidebar-section {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-section:last-child {
        border-bottom: none;
    }
    .sidebar-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .sidebar-title svg {
        opacity: 0.5;
        width: 13px;
        height: 13px;
    }
    .form-check-input {
        width: 16px;
        height: 16px;
        background-color: var(--bg-tertiary);
        border: 2px solid var(--border-light);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s ease;
    }
    .form-check-input:checked {
        background-color: var(--accent-primary);
        border-color: var(--accent-primary);
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3e%3cpath fill='none' stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='3' d='M6 10l3 3 6-6'/%3e%3c/svg%3e");
        background-size: 12px;
        background-position: center;
        background-repeat: no-repeat;
    }
    .form-check-input:focus {
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-primary-soft);
    }
    .sidebar-section .form-check {
        margin-bottom: 8px;
    }
    .sidebar-section .form-check-label {
        color: var(--text-secondary);
        font-size: 13px;
        cursor: pointer;
        user-select: none;
    }
    .sidebar-section .form-select {
        background-color: var(--bg-tertiary);
        border-color: var(--border-light);
        color: var(--text-primary);
        font-size: 13px;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 10px center;
        background-size: 14px;
        padding-right: 32px;
    }
    .sidebar-section .form-select:focus {
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-primary-soft);
    }
    #map {
        position: relative;
        z-index: 0;
    }
    .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
        box-shadow: 0 0 6px currentColor;
    }
    .legend-dot.bg-danger    { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    .legend-dot.bg-warning   { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.5); }
    .legend-dot.bg-info      { background: #3b82f6; box-shadow: 0 0 6px rgba(59,130,246,0.5); }
    .legend-dot.bg-success   { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .legend-dot.bg-secondary { background: #64748b; box-shadow: 0 0 6px rgba(100,116,139,0.3); }
    .legend-dot.bg-primary   { background: #3b82f6; box-shadow: 0 0 6px rgba(59,130,246,0.5); }

    .sidebar-stats, .sidebar-device-info {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.6;
    }

    .sidebar-mobile-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 1050;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-primary), #818cf8);
        border: none;
        color: white;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px var(--accent-primary-glow),
                    0 4px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
    }
    .sidebar-mobile-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px var(--accent-primary-glow);
    }

    /* Offcanvas 深色 */
    .offcanvas {
        background: var(--bg-secondary) !important;
    }
    .offcanvas-header {
        border-bottom: 1px solid var(--border-subtle);
    }
    .offcanvas-title {
        color: var(--text-primary);
    }
    .offcanvas .btn-close {
        filter: invert(1);
    }

    /* 弹窗深色 */
    .modal-content {
        background: var(--bg-secondary);
        border: 1px solid var(--border-light);
    }
    .modal-header {
        border-bottom: 1px solid var(--border-subtle);
    }
    .modal-title {
        color: var(--text-primary);
    }

    @media (max-width: 991.98px) {
        .sidebar-desktop { display: none; }
        .main-wrapper { grid-template-columns: 1fr; }
    }

    .device-icon-wrapper {
        background: none !important;
        border: none !important;
    }

    .tile-switcher {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: var(--glass-border);
        border-radius: var(--radius-md);
        padding: 4px;
        display: flex;
        gap: 2px;
    }
    .tile-switcher button {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 12px;
        padding: 6px 12px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
    }
    .tile-switcher button:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-primary);
    }
    .tile-switcher button.active {
        background: var(--accent-primary);
        color: white;
        box-shadow: 0 0 12px var(--accent-primary-glow);
    }

    .device-info-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-subtle);
    }
    .device-info-header .device-name {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
    }
    .device-info-header .device-node {
        font-size: 11px;
        color: var(--text-muted);
    }
    .device-info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--border-subtle);
        font-size: 12px;
    }
    .device-info-row:last-child { border-bottom: none; }
    .device-info-label {
        color: var(--text-muted);
    }
    .device-info-value {
        color: var(--text-primary);
        font-weight: 600;
        font-family: 'SF Mono', 'Fira Code', monospace;
    }
</style>
{% endblock %}

{% block content %}
<div class="main-wrapper">
<!-- Desktop Sidebar -->
<div class="sidebar-desktop d-none d-lg-block">
    <!-- 图层控制 -->
    <div class="sidebar-section">
        <div class="sidebar-title">
            <svg width="14" height="14"><use href="#icon-settings"/></svg>
            图层控制
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="toggle-devices" checked>
            <label class="form-check-label" for="toggle-devices">设备</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="toggle-nodes" checked>
            <label class="form-check-label" for="toggle-nodes">管点</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="toggle-pipes" checked>
            <label class="form-check-label" for="toggle-pipes">管线</label>
        </div>
    </div>

    <!-- 设备筛选 -->
    <div class="sidebar-section">
        <div class="sidebar-title">
            <svg width="14" height="14"><use href="#icon-filter"/></svg>
            设备筛选
        </div>
        <select class="form-select form-select-sm" id="device-type-filter">
            <option value="all">全部类型</option>
        </select>
    </div>

    <!-- 设备状态 -->
    <div class="sidebar-section">
        <div class="sidebar-title">
            <svg width="14" height="14"><use href="#icon-activity"/></svg>
            设备状态
        </div>
        <div class="small">
            <div class="d-flex align-items-center mb-2">
                <svg width="18" height="18" viewBox="0 0 800 800" class="me-2">
                    <polygon points="400,150 573.2,250 573.2,450 400,550 226.8,450 226.8,250" fill="rgba(239,68,68,0.6)" stroke="#ef4444" stroke-width="30" stroke-linejoin="round"/>
                    <circle cx="400" cy="350" r="100" fill="#0D1B2A" stroke="#ef4444" stroke-width="16"/>
                    <circle cx="400" cy="350" r="50" fill="#ef4444"/>
                </svg>
                <span style="color: var(--text-secondary)">严重</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <svg width="18" height="18" viewBox="0 0 800 800" class="me-2">
                    <polygon points="400,150 573.2,250 573.2,450 400,550 226.8,450 226.8,250" fill="rgba(245,158,11,0.6)" stroke="#f59e0b" stroke-width="30" stroke-linejoin="round"/>
                    <circle cx="400" cy="350" r="100" fill="#0D1B2A" stroke="#f59e0b" stroke-width="16"/>
                    <circle cx="400" cy="350" r="50" fill="#f59e0b"/>
                </svg>
                <span style="color: var(--text-secondary)">警告</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <svg width="18" height="18" viewBox="0 0 800 800" class="me-2">
                    <polygon points="400,150 573.2,250 573.2,450 400,550 226.8,450 226.8,250" fill="rgba(59,130,246,0.6)" stroke="#3b82f6" stroke-width="30" stroke-linejoin="round"/>
                    <circle cx="400" cy="350" r="100" fill="#0D1B2A" stroke="#3b82f6" stroke-width="16"/>
                    <circle cx="400" cy="350" r="50" fill="#3b82f6"/>
                </svg>
                <span style="color: var(--text-secondary)">中等</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <svg width="18" height="18" viewBox="0 0 800 800" class="me-2">
                    <polygon points="400,150 573.2,250 573.2,450 400,550 226.8,450 226.8,250" fill="rgba(16,185,129,0.6)" stroke="#10b981" stroke-width="30" stroke-linejoin="round"/>
                    <circle cx="400" cy="350" r="100" fill="#0D1B2A" stroke="#10b981" stroke-width="16"/>
                    <circle cx="400" cy="350" r="50" fill="#10b981"/>
                </svg>
                <span style="color: var(--text-secondary)">正常</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <svg width="18" height="18" viewBox="0 0 800 800" class="me-2" style="opacity:0.5">
                    <polygon points="400,150 573.2,250 573.2,450 400,550 226.8,450 226.8,250" fill="rgba(100,116,139,0.4)" stroke="#64748b" stroke-width="30" stroke-linejoin="round"/>
                    <circle cx="400" cy="350" r="100" fill="#0D1B2A" stroke="#64748b" stroke-width="16"/>
                    <circle cx="400" cy="350" r="50" fill="#64748b"/>
                </svg>
                <span style="color: var(--text-secondary)">离线</span>
            </div>
        </div>
    </div>

    <!-- 管线类型 -->
    <div class="sidebar-section">
        <div class="sidebar-title">
            <svg width="14" height="14"><use href="#icon-pipe-logo"/></svg>
            管线类型
        </div>
        <div class="small">
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot bg-primary me-2"></span>
                <span style="color: var(--text-secondary)">雨水管线</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot" style="background:#f97316"></span>
                <span style="color: var(--text-secondary)">污水管线</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot bg-success me-2"></span>
                <span style="color: var(--text-secondary)">管点</span>
            </div>
        </div>
    </div>

    <!-- 统计信息 -->
    <div class="sidebar-section">
        <div class="sidebar-title">
            <svg width="14" height="14"><use href="#icon-bar-chart"/></svg>
            统计信息
        </div>
        <div id="stats" class="sidebar-stats"></div>
    </div>

    <!-- 设备详情 -->
    <div class="sidebar-section">
        <div class="sidebar-title">
            <svg width="14" height="14"><use href="#icon-info"/></svg>
            设备详情
        </div>
        <div id="device-info" class="sidebar-device-info">
            <p style="color: var(--text-muted); font-style: italic; margin: 0;">点击设备查看详情</p>
        </div>
    </div>
</div>

<!-- Map Container -->
<div id="map"></div>
</div><!-- end main-wrapper -->

<!-- Mobile Sidebar Button -->
<button class="sidebar-mobile-btn d-lg-none"
        data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
    <svg width="22" height="22"><use href="#icon-settings"/></svg>
</button>

<!-- Mobile Offcanvas Sidebar -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title fw-bold">筛选控制</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <h6 class="fw-bold mb-3" style="color: var(--text-primary);">图层控制</h6>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="toggle-devices-mobile" checked>
            <label class="form-check-label" for="toggle-devices-mobile">设备</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="toggle-nodes-mobile" checked>
            <label class="form-check-label" for="toggle-nodes-mobile">管点</label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="toggle-pipes-mobile" checked>
            <label class="form-check-label" for="toggle-pipes-mobile">管线</label>
        </div>

        <hr class="gradient-divider">

        <h6 class="fw-bold mb-3" style="color: var(--text-primary);">设备筛选</h6>
        <select class="form-select form-select-sm" id="device-type-filter-mobile">
            <option value="all">全部类型</option>
        </select>

        <hr class="gradient-divider">

        <h6 class="fw-bold mb-3" style="color: var(--text-primary);">设备状态</h6>
        <div class="small">
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot bg-danger me-2"></span>
                <span style="color: var(--text-secondary)">严重</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot bg-warning me-2"></span>
                <span style="color: var(--text-secondary)">警告</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot bg-info me-2"></span>
                <span style="color: var(--text-secondary)">中等</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot bg-success me-2"></span>
                <span style="color: var(--text-secondary)">正常</span>
            </div>
            <div class="d-flex align-items-center mb-2">
                <span class="legend-dot bg-secondary me-2"></span>
                <span style="color: var(--text-secondary)">离线</span>
            </div>
        </div>

        <hr class="gradient-divider">

        <h6 class="fw-bold mb-2" style="color: var(--text-primary);">统计信息</h6>
        <div id="stats-mobile" class="sidebar-stats"></div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal fade" id="profile-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">管线纵断面图</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="modal-profile-content">
                    <p style="color: var(--text-muted);">加载中...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts_extra %}
<script src="{{ url_for('static', filename='js/vendor/leaflet.js') }}"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script>
// Invalidate map size after sidebar loads
window.addEventListener('load', function() {
    if (window.map) {
        setTimeout(function() { map.invalidateSize(); }, 100);
    }
});
// Sync mobile sidebar checkboxes with desktop
document.querySelectorAll('#toggle-devices-mobile, #toggle-nodes-mobile, #toggle-pipes-mobile').forEach(el => {
    el.addEventListener('change', function() {
        const desktopId = this.id.replace('-mobile', '');
        const desktopEl = document.getElementById(desktopId);
        if (desktopEl) {
            desktopEl.checked = this.checked;
            desktopEl.dispatchEvent(new Event('change'));
        }
    });
});
document.getElementById('device-type-filter-mobile')?.addEventListener('change', function() {
    const desktop = document.getElementById('device-type-filter');
    if (desktop) {
        desktop.value = this.value;
        desktop.dispatchEvent(new Event('change'));
    }
});
</script>
{% endblock %}
